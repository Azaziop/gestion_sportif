server:
  port: 8080

spring:
  cloud:
    compatibility-verifier:
      enabled: false
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowed-origins: "http://localhost:5173,http://localhost:3000"
            allowed-methods: "*"
            allowed-headers: "*"
            allow-credentials: true
      routes:
        # Auth Service (pointing to adherent-service)
        - id: auth-service
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - name: StripPrefix
              args:
                parts: 0
        # Adherent Service
        - id: adherent-service
          uri: ${ADHERENT_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/adherents/**,/api/subscriptions/**,/api/reports/**,/api/profile
          filters:
            - name: StripPrefix
              args:
                parts: 0
        # Sport Service  
        - id: sport-service
          uri: ${SPORT_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/reservations/**,/api/waiting-list/**
          filters:
            - name: StripPrefix
              args:
                parts: 0
        # Cours Service
        - id: cours-service
          uri: ${COURS_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/cours/**
          filters:
            - name: StripPrefix
              args:
                parts: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info

# Disable Eureka
eureka:
  client:
    enabled: false
    register-with-eureka: false
    fetch-registry: false
