spring.application.name=cours-service
server.port=8084
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/cours_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
security.jwt.secret=${JWT_SECRET:dev-secret-key-minimum-32-characters-required-for-hs256}
security.jwt.expiration-ms=3600000

# Spring Cloud Config - DISABLED
spring.cloud.config.enabled=false
spring.cloud.config.fail-fast=false
spring.cloud.compatibility-verifier.enabled=false

# Eureka Configuration
eureka.client.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=false

# RabbitMQ (valeurs par défaut pour démarrer sans config-server)
rabbitmq.exchange.cours=cours.exchange
rabbitmq.queue.cours.created=cours.created.queue
rabbitmq.queue.cours.updated=cours.updated.queue
rabbitmq.queue.cours.deleted=cours.deleted.queue

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger/OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha