spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "http://localhost:5173"
                  - "http://localhost:5174"
                allowed-methods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                  - PATCH
                allowed-headers: "*"
                allow-credentials: true
                max-age: 3600
      routes:
            - id: auth-service
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**
            - id: user-service
              uri: lb://user-service
              predicates:
                - Path=/api/profile/**
            - id: adherent-service
              uri: lb://adherent-service
              predicates:
                - Path=/api/adherents/**,/api/subscriptions/**,/api/reports/**
            - id: cours-service
              uri: lb://cours-service
              predicates:
                - Path=/api/cours/**,/api/sessions/**
            - id: reservation-service
              uri: lb://reservation-service
              predicates:
                - Path=/api/reservations/**,/api/bookings/**,/api/sports/**

server:
  port: 8080
  servlet:
    context-path: /

security:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-for-jwt-must-be-at-least-256-bits-long-for-HS256}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,routes
