spring:
  application:
    name: auth-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123}
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8082
  servlet:
    context-path: /

jwt:
  secret: your-secret-key-for-jwt-must-be-at-least-256-bits-long-for-HS256
  expiration: 86400000

security:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-for-jwt-must-be-at-least-256-bits-long-for-HS256}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
