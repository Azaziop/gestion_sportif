spring:
  application:
    name: cours-service
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/cours_db
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123}
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8084
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
