# ===== APPLICATION CONFIGURATION =====
spring.application.name=cours-service
server.port=8081

# ===== POSTGRESQL DATABASE CONFIGURATION =====
# PostgreSQL datasource (utiliser la base cours_db que vous avez créée)
spring.datasource.url=jdbc:postgresql://localhost:5432/cours_db

spring.datasource.username=postgres
spring.datasource.password=passroot
spring.datasource.driver-class-name=org.postgresql.Driver

# ===== JPA / HIBERNATE CONFIGURATION =====
# Changez cette ligne TEMPORAIREMENT
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ===== LOGGING CONFIGURATION =====
logging.level.org.springframework=INFO
logging.level.com.gestion.sportif.backend=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ===== RABBITMQ CONFIGURATION =====
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Queue names
rabbitmq.queue.cours.created=cours.created.queue
rabbitmq.queue.cours.updated=cours.updated.queue
rabbitmq.queue.cours.deleted=cours.deleted.queue

# Exchange
rabbitmq.exchange.cours=cours.exchange

# ===== BATCH CONFIGURATION =====
spring.batch.job.enabled=false

# ===== SECURITY / JWT CONFIGURATION =====
security.jwt.secret=fdcfdab0d0b44b4a9c0d3f73c3f4fb8d5bf59c8bc7fa4f9ea53b7bc2cf7a5c8f
security.jwt.expiration-ms=3600000

# ===== CORS CONFIGURATION =====
cors.allowed-origins=http://localhost:3000,http://localhost:4200